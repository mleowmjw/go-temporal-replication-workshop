[env]
CGO_ENABLED = "0"
_.path = ["~/go/bin"]
_.file = ".env"

[tools]
go = "1.26"

# ---------------------------------------------------------------------------
# Session-1: Domain Foundation + Basic Provisioning Workflow
# ---------------------------------------------------------------------------

[tasks."session-1:build"]
description = "Build session-1 binary to bin/session-1"
run = "go build -o bin/session-1 ./cmd/session-1"

[tasks."session-1:dev"]
description = "Start full session-1 stack (Temporal + Postgres 18 + app) via overmind"
run = "overmind start -f Procfile.session-1"

[tasks."session-1"]
description = "Run session-1 control plane directly (requires Temporal dev server running)"
run = "mise run session-1:build && bin/session-1"

[tasks."session-1:test"]
description = "Run session-1 unit and integration tests (no external deps)"
run = "go test -race -v -count=1 ./internal/..."

[tasks."session-1:db:up"]
description = "Start Postgres 18 container for session-1 (detached)"
run = "docker compose -f cmd/session-1/01-db/compose.yml up -d"

[tasks."session-1:db:down"]
description = "Stop and remove session-1 Postgres container + volumes"
run = "docker compose -f cmd/session-1/01-db/compose.yml down -v"

[tasks."session-1:db:psql"]
description = "Open psql against session-1 Postgres"
run = "psql postgresql://postgres:postgres@localhost:5432/appdb"

[tasks."session-1:db:logs"]
description = "Tail session-1 Postgres container logs"
run = "docker compose -f cmd/session-1/01-db/compose.yml logs -f postgres"

# ---------------------------------------------------------------------------
# Session-2: Debezium + Kafka Connect CDC Pipeline
# ---------------------------------------------------------------------------

[tasks."session-2:build"]
description = "Build session-2 binary to bin/session-2"
run = "go build -o bin/session-2 ./cmd/session-2"

[tasks."session-2:dev"]
description = "Start full session-2 stack (Temporal + Postgres 18 + Kafka + Debezium + app) via overmind"
run = "overmind start -f Procfile.session-2"

[tasks."session-2"]
description = "Run session-2 control plane directly (requires Temporal dev server running)"
run = "mise run session-2:build && bin/session-2"

[tasks."session-2:test"]
description = "Run session-2 unit and integration tests (no external deps)"
run = "go test -race -v -count=1 ./internal/..."

[tasks."session-2:db:up"]
description = "Start Postgres 18 + Kafka + Debezium Connect containers for session-2 (detached)"
run = "docker compose -f cmd/session-2/02-cdc/compose.yml up -d"

[tasks."session-2:db:down"]
description = "Stop and remove session-2 containers + volumes"
run = "docker compose -f cmd/session-2/02-cdc/compose.yml down -v"

[tasks."session-2:db:psql"]
description = "Open psql against session-2 Postgres (port 5433)"
run = "psql postgresql://postgres:postgres@localhost:5433/appdb"

[tasks."session-2:db:logs"]
description = "Tail session-2 container logs"
run = "docker compose -f cmd/session-2/02-cdc/compose.yml logs -f"

# ---------------------------------------------------------------------------
# Session-3: Temporal Observability (Prometheus metrics + audit trail)
# ---------------------------------------------------------------------------

[tasks."session-3:build"]
description = "Build session-3 binary to bin/session-3"
run = "go build -o bin/session-3 ./cmd/session-3"

[tasks."session-3:dev"]
description = "Start full session-3 stack (Temporal + CDC + Observability + app) via overmind"
run = "overmind start -f Procfile.session-3"

[tasks."session-3"]
description = "Run session-3 control plane directly (requires Temporal dev server running)"
run = "mise run session-3:build && bin/session-3"

[tasks."session-3:test"]
description = "Run session-3 unit and integration tests (no external deps)"
run = "go test -race -v -count=1 ./internal/..."

[tasks."session-3:db:up"]
description = "Start Postgres 18 + Kafka + Debezium Connect containers for session-3 (detached)"
run = "docker compose -f cmd/session-3/02-cdc/compose.yml up -d"

[tasks."session-3:db:down"]
description = "Stop and remove session-3 CDC containers + volumes"
run = "docker compose -f cmd/session-3/02-cdc/compose.yml down -v"

[tasks."session-3:db:psql"]
description = "Open psql against session-3 Postgres (port 5434)"
run = "psql postgresql://postgres:postgres@localhost:5434/appdb"

[tasks."session-3:db:logs"]
description = "Tail session-3 container logs"
run = "docker compose -f cmd/session-3/02-cdc/compose.yml logs -f"

[tasks."session-3:obs:up"]
description = "Start session-3 observability stack (VictoriaMetrics + vmagent + VictoriaLogs + Vector)"
run = "docker compose -f cmd/session-3/03-platform/compose.yml up -d"

[tasks."session-3:obs:down"]
description = "Stop session-3 observability stack"
run = "docker compose -f cmd/session-3/03-platform/compose.yml down -v"

[tasks."session-3:obs:logs"]
description = "Tail session-3 observability container logs"
run = "docker compose -f cmd/session-3/03-platform/compose.yml logs -f"

# ---------------------------------------------------------------------------
# Blue-Green: Database Blue-Green Deployment Workshop (Dev)
# ---------------------------------------------------------------------------

[tasks."blue-green:build"]
description = "Build blue-green binary to bin/blue-green"
run = "go build -o bin/blue-green ./cmd/blue-green"

[tasks."blue-green:dev"]
description = "Start full blue-green stack (Temporal + Postgres 18 + app) via overmind"
run = "overmind start -f Procfile.blue-green"

[tasks."blue-green"]
description = "Run blue-green control plane directly (requires Temporal dev server running)"
run = "mise run blue-green:build && bin/blue-green"

[tasks."blue-green:test"]
description = "Run blue-green unit and integration tests (no external deps)"
run = "gotest -race -v -count=1 ./internal/bluegreen/..."

[tasks."blue-green:db:up"]
description = "Start Postgres 18 container for blue-green (detached, port 5435)"
run = "docker compose -f cmd/blue-green/01-db/compose.yml up -d"

[tasks."blue-green:db:down"]
description = "Stop and remove blue-green Postgres container + volumes"
run = "docker compose -f cmd/blue-green/01-db/compose.yml down -v"

[tasks."blue-green:db:psql"]
description = "Open psql against blue-green Postgres (port 5435)"
run = "psql postgresql://postgres:postgres@localhost:5435/appdb"

[tasks."blue-green:db:logs"]
description = "Tail blue-green Postgres container logs"
run = "docker compose -f cmd/blue-green/01-db/compose.yml logs -f postgres"

[tasks."blue-green:teardown"]
description = "Stop all blue-green processes and remove all created data"
run = """
echo "Stopping Postgres..."
docker compose -f cmd/blue-green/01-db/compose.yml down -v 2>/dev/null || true
echo "Removing binary..."
rm -f bin/blue-green
echo "Removing Temporal database..."
rm -rf .temporal
echo "Done — system restored."
"""

# ---------------------------------------------------------------------------
# Blue-Green: Database Blue-Green Deployment Workshop
# ---------------------------------------------------------------------------

[tasks."workshop:blue-green:setup"]
description = "Check all prerequisites for the blue-green workshop"
run = """
set -e
# mise task scripts are not interactive shells, so extend PATH to cover all
# common install locations: homebrew (Mac), go install, user-local, system.
export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin:$HOME/.local/bin:$HOME/go/bin"
PASS="✅" FAIL="❌" WARN="⚠️ " OK=true
echo ""
echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
echo "  Blue-Green Workshop — Prerequisites Check"
echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
echo ""
if go version >/dev/null 2>&1; then
  echo "$PASS Go   $(go version | awk '{print $3}')"
else
  echo "$FAIL Go   not found — run: mise install"; OK=false
fi
if docker info >/dev/null 2>&1; then
  echo "$PASS Docker   running"
else
  echo "$FAIL Docker   not running — start Docker Desktop"; OK=false
fi
if temporal version >/dev/null 2>&1; then
  echo "$PASS temporal   $(temporal version 2>&1 | head -1)"
else
  echo "$WARN temporal CLI not found"
  echo "      Mac: brew install temporal"
  echo "      Linux: curl -sSf https://temporal.download/cli.sh | sh"
  echo "      Windows: winget install Temporal.TemporalCLI"; OK=false
fi
if overmind version >/dev/null 2>&1; then
  echo "$PASS overmind   $(overmind version 2>&1 | head -1)"
else
  echo "$WARN overmind not found (Mac/Linux only — Windows: use 3 terminals)"
  echo "      Mac: brew install overmind"
  echo "      Linux: go install github.com/DarthSim/overmind/v2@latest"
fi
psql --version >/dev/null 2>&1 && echo "$PASS psql   $(psql --version)" || echo "$WARN psql not found (optional)"
echo ""
[ "$OK" = true ] && echo "All required tools found. Next: mise run blue-green:test" || echo "Fix missing tools above, then re-run: mise run blue-green:setup"
echo ""
"""

[tasks."workshop:blue-green:up"]
description = "Start the full workshop stack via Docker (no local tools needed)"
run = "docker compose -f cmd/blue-green/compose.workshop.yml up"

[tasks."workshop:blue-green:down"]
description = "Stop and clean up the Docker workshop stack"
run = "docker compose -f cmd/blue-green/compose.workshop.yml down -v"

[tasks."workshop:blue-green:test"]
description = "Run workshop tests inside Docker (no local Go needed)"
run = "docker compose -f cmd/blue-green/compose.workshop.yml run --rm test"

