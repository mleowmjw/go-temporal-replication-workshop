# air config for blue-green hot-reload
# Runs from workspace root (overmind cds to root before starting processes)
root = "."
tmp_dir = ".air-blue-green"

[build]
  cmd        = "go build -o bin/blue-green ./cmd/blue-green"
  bin        = "bin/blue-green"
  full_bin   = "bin/blue-green"
  delay      = 1000
  include_ext = ["go", "toml"]
  include_dir = ["cmd/blue-green", "internal"]
  exclude_dir = [".air-blue-green", ".temporal", "vendor", "node_modules"]

[log]
  time = true

[color]
  build  = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
