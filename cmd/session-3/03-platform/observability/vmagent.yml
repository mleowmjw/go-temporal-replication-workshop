global:
  scrape_interval: 5s

scrape_configs:
  - job_name: temporal-dev-server
    static_configs:
      - targets:
          - host.docker.internal:8077

  - job_name: temporal-go-worker
    static_configs:
      - targets:
          - host.docker.internal:9090

  - job_name: vmagent
    static_configs:
      - targets:
          - vmagent:8429
